# Pull Request Welcome Workflow
# This workflow automatically posts a welcome comment when a new pull request is opened.
# It thanks the contributor for their code and mentions the review process.

name: Pull Request Welcome

on:
  pull_request:
    types: [opened]

# Set least-privilege permissions
permissions:
  pull-requests: write

jobs:
  welcome-pr:
    name: Post Welcome Comment
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            
            // Check if the PR already has a welcome comment to avoid duplicates
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
            });
            
            const hasWelcomeComment = comments.data.some(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Thanks for your contribution')
            );
            
            if (hasWelcomeComment) {
              console.log('Welcome comment already exists, skipping.');
              return;
            }
            
            // Post the welcome comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              body: `Thanks for your contribution! 🎉 Your pull request has been received and will be reviewed soon.

Automated checks are currently running on your changes. Once they pass, a maintainer will review the code changes. Please respond to any review comments and make necessary updates.

If you haven't already, please ensure your PR follows our [contributing guidelines](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md).`
            });
