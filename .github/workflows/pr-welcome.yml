# Pull Request Welcome Workflow
# This workflow posts a professional welcome comment when a new pull request is opened.
# A hidden marker is used so the workflow can stay idempotent without depending on the visible text.

name: Pull Request Welcome

on:
  pull_request:
    types: [opened]

# Set least-privilege permissions
permissions:
  pull-requests: write

jobs:
  welcome-pr:
    name: Post Welcome Comment
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const welcomeMarker = '<!-- caresync-pr-welcome -->';
            
            // Check if the PR already has a welcome comment to avoid duplicates.
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
            });
            
            const hasWelcomeComment = comments.data.some(comment => 
              comment.body.includes(welcomeMarker)
            );
            
            if (hasWelcomeComment) {
              console.log('Welcome comment already exists, skipping.');
              return;
            }
            
            // Post the welcome comment.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              body: `🎉 Thank you for submitting a Pull Request to CareSync!

            We appreciate your contribution.

            Before review, please ensure:

            ✅ Your branch is up to date with the latest main branch
            ✅ Code follows project conventions
            ✅ Changes are focused and relevant
            ✅ Documentation is updated if necessary
            ✅ The application builds successfully

            A maintainer will review your contribution soon.

            Thank you for helping make CareSync better! 🚀

            ${welcomeMarker}`
            });
