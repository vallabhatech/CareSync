name: Manual PR Triage

on:
  workflow_dispatch:

permissions:
  pull-requests: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const pulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              }
            );

            for (const pr of pulls) {
              const existingLabels = pr.labels.map(l => l.name);

              // Skip if PR already has any labels
              if (existingLabels.length > 0) {
                console.log(`PR #${pr.number} already labeled. Skipping.`);
                continue;
              }

              const text = `${pr.title} ${pr.body || ''}`.toLowerCase();

              const labels = [];

              if (
                ['bug', 'fix', 'error', 'issue', 'resolve']
                .some(k => text.includes(k))
              ) labels.push('bug');

              if (
                ['feature', 'enhancement', 'improve', 'add']
                .some(k => text.includes(k))
              ) labels.push('enhancement');

              if (
                ['doc', 'documentation', 'readme']
                .some(k => text.includes(k))
              ) labels.push('documentation');

              if (
                ['security', 'xss', 'csrf', 'vulnerability']
                .some(k => text.includes(k))
              ) labels.push('security');

              if (
                ['performance', 'optimize', 'latency']
                .some(k => text.includes(k))
              ) labels.push('performance');

              if (
                ['ui', 'ux', 'css', 'layout', 'responsive']
                .some(k => text.includes(k))
              ) labels.push('ui/ux');

              if (
                ['react', 'html', 'css', 'javascript']
                .some(k => text.includes(k))
              ) labels.push('frontend');

              if (
                ['api', 'server', 'database', 'auth']
                .some(k => text.includes(k))
              ) labels.push('backend');

              if (
                ['test', 'jest', 'playwright', 'cypress']
                .some(k => text.includes(k))
              ) labels.push('testing');

              if (labels.length === 0) {
                console.log(`PR #${pr.number}: no matching labels`);
                continue;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [...new Set(labels)]
              });

              console.log(`PR #${pr.number}: labels added`);
            }