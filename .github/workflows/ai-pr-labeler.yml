name: Manual PR Triage

on:
workflow_dispatch:

permissions:
contents: read
issues: write
pull-requests: read

jobs:
triage:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/github-script@v8
    with:
      script: |
        const pulls = await github.paginate(
          github.rest.pulls.list,
          {
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'all'
          }
        );

        for (const pr of pulls) {
          const existingLabels = pr.labels.map(label => label.name);

          // Skip PRs that already have labels
          if (existingLabels.length > 0) {
            console.log(`PR #${pr.number} already labeled. Skipping.`);
            continue;
          }

          const text = `${pr.title} ${pr.body || ''}`.toLowerCase();

          const labels = [];

          if (
            ['bug', 'fix', 'error', 'issue', 'resolve', 'broken']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('bug');
          }

          if (
            ['feature', 'enhancement', 'improve', 'add', 'implement']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('enhancement');
          }

          if (
            ['doc', 'docs', 'documentation', 'readme', 'guide']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('documentation');
          }

          if (
            ['security', 'vulnerability', 'xss', 'csrf', 'auth bypass']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('security');
          }

          if (
            ['performance', 'optimize', 'optimization', 'latency', 'slow']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('performance');
          }

          if (
            ['ui', 'ux', 'design', 'layout', 'responsive', 'css']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('ui/ux');
          }

          if (
            ['frontend', 'react', 'html', 'css', 'javascript', 'typescript']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('frontend');
          }

          if (
            ['backend', 'api', 'server', 'database', 'auth', 'endpoint']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('backend');
          }

          if (
            ['test', 'testing', 'jest', 'cypress', 'playwright', 'qa']
              .some(keyword => text.includes(keyword))
          ) {
            labels.push('testing');
          }

          if (labels.length === 0) {
            console.log(`PR #${pr.number}: no matching labels`);
            continue;
          }

          try {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...new Set(labels)]
            });

            console.log(`PR #${pr.number}: added ${labels.join(', ')}`);
          } catch (error) {
            console.log(`PR #${pr.number}: failed - ${error.message}`);
          }
        }
```
