# Issue Welcome Workflow
# This workflow posts a professional welcome comment when a new issue is opened.
# A hidden marker is used so the workflow can stay idempotent without depending on the visible text.

name: Issue Welcome

on:
  issues:
    types: [opened]

# Set least-privilege permissions
permissions:
  issues: write

jobs:
  welcome-issue:
    name: Post Welcome Comment
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const welcomeMarker = '<!-- caresync-issue-welcome -->';
            
            // Check if the issue already has a welcome comment to avoid duplicates.
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });
            
            const hasWelcomeComment = comments.data.some(comment => 
              comment.body.includes(welcomeMarker)
            );
            
            if (hasWelcomeComment) {
              console.log('Welcome comment already exists, skipping.');
              return;
            }
            
            // Post the welcome comment.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `👋 Thank you for opening an issue in CareSync!

            We appreciate your effort in helping improve the project.

            Before a maintainer reviews this issue, please ensure:

            ✅ The issue description is clear and detailed
            ✅ Steps to reproduce are included (for bugs)
            ✅ Expected behavior is explained
            ✅ Screenshots are attached when helpful

            A maintainer will review this issue as soon as possible.

            Thank you for contributing to CareSync! 🚀

            ${welcomeMarker}`
            });
