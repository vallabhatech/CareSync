# Auto Review Request Workflow
# This workflow requests a review from vallabhatech for new pull requests.
# It does not assign issues; issue automation is handled separately.

name: Auto Review Request

on:
  pull_request:
    types: [opened]

# Set least-privilege permissions
permissions:
  pull-requests: write

jobs:
  request-review:
    name: Request Review from Maintainer
    runs-on: ubuntu-latest
    steps:
      - name: Request review from vallabhatech
        uses: actions/github-script@v9
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const reviewer = 'vallabhatech';

            // Skip self-review requests and duplicate review requests.
            if (pullRequest.user.login === reviewer) {
              console.log(`Skipping review request for PR #${pullRequest.number} because the author is ${reviewer}.`);
              return;
            }

            const requestedReviewers = pullRequest.requested_reviewers?.map(reviewer => reviewer.login) ?? [];
            if (requestedReviewers.includes(reviewer)) {
              console.log(`Review from ${reviewer} was already requested for PR #${pullRequest.number}.`);
              return;
            }
            
            // Request review from the maintainer
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              reviewers: [reviewer]
            });
            
            console.log(`Requested review from ${reviewer} for PR #${pullRequest.number}`);
