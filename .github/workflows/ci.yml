name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund || true

      - name: Run ESLint
        id: eslint
        run: |
          npm run lint || true 2>&1 | tee eslint-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results
          path: eslint-output.txt

      - name: Fail if ESLint errors
        if: steps.eslint.outputs.exit_code != '0'
        run: exit 1

  typecheck:
    name: TypeScript Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund || true

      - name: Run TypeScript type check
        id: typecheck
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload TypeScript results
        uses: actions/upload-artifact@v4
        with:
          name: tsc-results
          path: tsc-output.txt

      - name: Fail if type errors
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1

  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund || true

      - name: Run tests
        id: tests
        run: |
          npm test -- --coverage --ci 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-output.txt

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1

  pr-comment:
    name: PR Feedback Comment
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: Download ESLint results
        uses: actions/download-artifact@v4
        with:
          name: eslint-results
        continue-on-error: true

      - name: Download TypeScript results
        uses: actions/download-artifact@v4
        with:
          name: tsc-results
        continue-on-error: true

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const readFile = (path) => {
              try { return fs.readFileSync(path, 'utf8').trim().slice(0, 1500); }
              catch { return '_No output available_'; }
            };

            const lintOutput = readFile('eslint-output.txt');
            const tscOutput = readFile('tsc-output.txt');
            const testOutput = readFile('test-output.txt');

            const lintStatus = '${{ needs.lint.result }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const tscStatus = '${{ needs.typecheck.result }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const testStatus = '${{ needs.test.result }}' === 'success' ? '✅ Passed' : '❌ Failed';

            const body = `## 🤖 CI Pipeline Results

            | Check | Status |
            |-------|--------|
            | ESLint | ${lintStatus} |
            | TypeScript | ${tscStatus} |
            | Tests | ${testStatus} |

            <details>
            <summary>📋 ESLint Output</summary>

            \`\`\`
            ${lintOutput}
            \`\`\`
            </details>

            <details>
            <summary>🔷 TypeScript Output</summary>

            \`\`\`
            ${tscOutput}
            \`\`\`
            </details>

            <details>
            <summary>🧪 Test Output</summary>

            \`\`\`
            ${testOutput}
            \`\`\`
            </details>

            > _Automated feedback by CareSync CI — fix any issues above before requesting review._`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
