# Labeler configuration for CareSync
# Automatically adds labels to PRs based on changed file paths

# Backend
backend:
- changed-files:
  - any-glob-to-any-file: server/**/*

# Frontend
frontend:
- changed-files:
  - any-glob-to-any-file: src/**/*

# Documentation
documentation:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.md'
    - docs/**/*

# Testing
testing:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.test.*'
    - '**/*.spec.*'
    - '**/__tests__/**'

# UI/UX
ui/ux:
- changed-files:
  - any-glob-to-any-file:
    - src/components/**/*
    - src/pages/**/*
    - src/styles/**/*
    - public/**/*

# Security
security:
- changed-files:
  - any-glob-to-any-file:
    - '**/security*'
    - '**/auth*'
    - server/utils/encryption*

# Performance
performance:
- changed-files:
  - any-glob-to-any-file:
    - '**/performance*'
    - '**/optimization*'
